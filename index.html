<!DOCTYPE html>
<!--
  ⚽ Soccer Stats Tracker
  ========================
  Deploy to GitHub Pages:
  1. Create a new GitHub repository (e.g. "soccer-stats")
  2. Upload index.html, style.css, and script.js to the repo root
  3. Go to Settings → Pages → Source: Deploy from branch → main → / (root)
  4. Your site will be live at: https://yourusername.github.io/soccer-stats/
  
  No build step, no dependencies, no backend required.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Track live soccer match statistics for home and away teams." />
  <title>⚽ Soccer Stats Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Preconnect for Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ========== Background Soccer Balls ========== -->
  <!-- Decorative, aria-hidden so screen readers skip them -->
  <div class="bg-balls" aria-hidden="true">
    <svg class="bg-ball bg-ball--1" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="98" fill="white" stroke="#b0cce8" stroke-width="2"/>
      <polygon points="100,10 118,65 175,65 128,100 145,155 100,120 55,155 72,100 25,65 82,65" fill="#7aabcc" opacity="0.4"/>
      <circle cx="100" cy="100" r="18" fill="#7aabcc" opacity="0.4"/>
    </svg>
    <svg class="bg-ball bg-ball--2" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="98" fill="white" stroke="#b0cce8" stroke-width="2"/>
      <polygon points="100,10 118,65 175,65 128,100 145,155 100,120 55,155 72,100 25,65 82,65" fill="#7aabcc" opacity="0.4"/>
      <circle cx="100" cy="100" r="18" fill="#7aabcc" opacity="0.4"/>
    </svg>
    <svg class="bg-ball bg-ball--3" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="98" fill="white" stroke="#b0cce8" stroke-width="2"/>
      <polygon points="100,10 118,65 175,65 128,100 145,155 100,120 55,155 72,100 25,65 82,65" fill="#7aabcc" opacity="0.4"/>
      <circle cx="100" cy="100" r="18" fill="#7aabcc" opacity="0.4"/>
    </svg>
    <svg class="bg-ball bg-ball--4" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="98" fill="white" stroke="#b0cce8" stroke-width="2"/>
      <polygon points="100,10 118,65 175,65 128,100 145,155 100,120 55,155 72,100 25,65 82,65" fill="#7aabcc" opacity="0.4"/>
      <circle cx="100" cy="100" r="18" fill="#7aabcc" opacity="0.4"/>
    </svg>
  </div>

  <!-- ========== Confetti Canvas (injected by JS) ========== -->
  <canvas id="confetti-canvas" aria-hidden="true"></canvas>

  <!-- ========== Main App ========== -->
  <main class="app" role="main">

    <!-- Header -->
    <header class="app-header">
      <div class="header-ball" aria-hidden="true">⚽</div>
      <h1 class="app-title">Match Stats</h1>
      <p class="app-subtitle">Live match tracker</p>
    </header>

    <!-- Score Banner -->
    <section class="score-banner" aria-label="Current score">
      <div class="score-team score-team--home">
        <span class="score-label">Home</span>
        <span class="score-number" id="score-home" aria-live="polite">0</span>
      </div>
      <div class="score-divider" aria-hidden="true">
        <span class="score-vs">VS</span>
      </div>
      <div class="score-team score-team--away">
        <span class="score-number" id="score-away" aria-live="polite">0</span>
        <span class="score-label">Away</span>
      </div>
    </section>

    <!-- Stats Grid -->
    <section class="stats-section" aria-label="Match statistics">

      <!-- Column Headers -->
      <div class="column-headers" aria-hidden="true">
        <div class="col-label col-label--home">🏠 Home</div>
        <div class="col-label col-label--stat">Stat</div>
        <div class="col-label col-label--away">Away ✈️</div>
      </div>

      <!-- Stats Rows -->
      <!-- Each row: stat-key used by JS to wire up buttons & display -->
      <div class="stats-grid" id="stats-grid">

        <!-- Goals -->
        <div class="stat-row" data-stat="goals">
          <div class="stat-controls stat-controls--home">
            <button
              class="btn btn-minus"
              aria-label="Decrease Home Goals"
              data-team="home"
              data-stat="goals">−</button>
            <span class="stat-value" id="home-goals" aria-live="polite" aria-atomic="true">0</span>
            <button
              class="btn btn-plus"
              aria-label="Increase Home Goals"
              data-team="home"
              data-stat="goals">+</button>
          </div>
          <div class="stat-name-cell">
            <span class="stat-name">Goals</span>
            <span class="stat-icon" aria-hidden="true">⚽</span>
          </div>
          <div class="stat-controls stat-controls--away">
            <button
              class="btn btn-minus"
              aria-label="Decrease Away Goals"
              data-team="away"
              data-stat="goals">−</button>
            <span class="stat-value" id="away-goals" aria-live="polite" aria-atomic="true">0</span>
            <button
              class="btn btn-plus"
              aria-label="Increase Away Goals"
              data-team="away"
              data-stat="goals">+</button>
          </div>
        </div>

        <!-- Shots -->
        <div class="stat-row" data-stat="shots">
          <div class="stat-controls stat-controls--home">
            <button class="btn btn-minus" aria-label="Decrease Home Shots" data-team="home" data-stat="shots">−</button>
            <span class="stat-value" id="home-shots" aria-live="polite" aria-atomic="true">0</span>
            <button class="btn btn-plus"  aria-label="Increase Home Shots" data-team="home" data-stat="shots">+</button>
          </div>
          <div class="stat-name-cell">
            <span class="stat-name">Shots</span>
            <span class="stat-icon" aria-hidden="true">🎯</span>
          </div>
          <div class="stat-controls stat-controls--away">
            <button class="btn btn-minus" aria-label="Decrease Away Shots" data-team="away" data-stat="shots">−</button>
            <span class="stat-value" id="away-shots" aria-live="polite" aria-atomic="true">0</span>
            <button class="btn btn-plus"  aria-label="Increase Away Shots" data-team="away" data-stat="shots">+</button>
          </div>
        </div>

        <!-- SOG (Shots on Goal) -->
        <div class="stat-row" data-stat="sog">
          <div class="stat-controls stat-controls--home">
            <button class="btn btn-minus" aria-label="Decrease Home Shots on Goal" data-team="home" data-stat="sog">−</button>
            <span class="stat-value" id="home-sog" aria-live="polite" aria-atomic="true">0</span>
            <button class="btn btn-plus"  aria-label="Increase Home Shots on Goal" data-team="home" data-stat="sog">+</button>
          </div>
          <div class="stat-name-cell">
            <span class="stat-name">SOG</span>
            <span class="stat-icon" aria-hidden="true">🥅</span>
          </div>
          <div class="stat-controls stat-controls--away">
            <button class="btn btn-minus" aria-label="Decrease Away Shots on Goal" data-team="away" data-stat="sog">−</button>
            <span class="stat-value" id="away-sog" aria-live="polite" aria-atomic="true">0</span>
            <button class="btn btn-plus"  aria-label="Increase Away Shots on Goal" data-team="away" data-stat="sog">+</button>
          </div>
        </div>

        <!-- Passes -->
        <div class="stat-row" data-stat="passes">
          <div class="stat-controls stat-controls--home">
            <button class="btn btn-minus" aria-label="Decrease Home Passes" data-team="home" data-stat="passes">−</button>
            <span class="stat-value" id="home-passes" aria-live="polite" aria-atomic="true">0</span>
            <button class="btn btn-plus"  aria-label="Increase Home Passes" data-team="home" data-stat="passes">+</button>
          </div>
          <div class="stat-name-cell">
            <span class="stat-name">Passes</span>
            <span class="stat-icon" aria-hidden="true">👟</span>
          </div>
          <div class="stat-controls stat-controls--away">
            <button class="btn btn-minus" aria-label="Decrease Away Passes" data-team="away" data-stat="passes">−</button>
            <span class="stat-value" id="away-passes" aria-live="polite" aria-atomic="true">0</span>
            <button class="btn btn-plus"  aria-label="Increase Away Passes" data-team="away" data-stat="passes">+</button>
          </div>
        </div>

        <!-- Freekicks -->
        <div class="stat-row" data-stat="freekicks">
          <div class="stat-controls stat-controls--home">
            <button class="btn btn-minus" aria-label="Decrease Home Freekicks" data-team="home" data-stat="freekicks">−</button>
            <span class="stat-value" id="home-freekicks" aria-live="polite" aria-atomic="true">0</span>
            <button class="btn btn-plus"  aria-label="Increase Home Freekicks" data-team="home" data-stat="freekicks">+</button>
          </div>
          <div class="stat-name-cell">
            <span class="stat-name">Freekicks</span>
            <span class="stat-icon" aria-hidden="true">🦵</span>
          </div>
          <div class="stat-controls stat-controls--away">
            <button class="btn btn-minus" aria-label="Decrease Away Freekicks" data-team="away" data-stat="freekicks">−</button>
            <span class="stat-value" id="away-freekicks" aria-live="polite" aria-atomic="true">0</span>
            <button class="btn btn-plus"  aria-label="Increase Away Freekicks" data-team="away" data-stat="freekicks">+</button>
          </div>
        </div>

        <!-- Fouls -->
        <div class="stat-row" data-stat="fouls">
          <div class="stat-controls stat-controls--home">
            <button class="btn btn-minus" aria-label="Decrease Home Fouls" data-team="home" data-stat="fouls">−</button>
            <span class="stat-value" id="home-fouls" aria-live="polite" aria-atomic="true">0</span>
            <button class="btn btn-plus"  aria-label="Increase Home Fouls" data-team="home" data-stat="fouls">+</button>
          </div>
          <div class="stat-name-cell">
            <span class="stat-name">Fouls</span>
            <span class="stat-icon" aria-hidden="true">🟨</span>
          </div>
          <div class="stat-controls stat-controls--away">
            <button class="btn btn-minus" aria-label="Decrease Away Fouls" data-team="away" data-stat="fouls">−</button>
            <span class="stat-value" id="away-fouls" aria-live="polite" aria-atomic="true">0</span>
            <button class="btn btn-plus"  aria-label="Increase Away Fouls" data-team="away" data-stat="fouls">+</button>
          </div>
        </div>

        <!-- Saves by Keeper -->
        <div class="stat-row" data-stat="saves">
          <div class="stat-controls stat-controls--home">
            <button class="btn btn-minus" aria-label="Decrease Home Saves" data-team="home" data-stat="saves">−</button>
            <span class="stat-value" id="home-saves" aria-live="polite" aria-atomic="true">0</span>
            <button class="btn btn-plus"  aria-label="Increase Home Saves" data-team="home" data-stat="saves">+</button>
          </div>
          <div class="stat-name-cell">
            <span class="stat-name">Saves</span>
            <span class="stat-icon" aria-hidden="true">🧤</span>
          </div>
          <div class="stat-controls stat-controls--away">
            <button class="btn btn-minus" aria-label="Decrease Away Saves" data-team="away" data-stat="saves">−</button>
            <span class="stat-value" id="away-saves" aria-live="polite" aria-atomic="true">0</span>
            <button class="btn btn-plus"  aria-label="Increase Away Saves" data-team="away" data-stat="saves">+</button>
          </div>
        </div>

      </div><!-- /.stats-grid -->
    </section>

    <!-- Reset Button -->
    <section class="reset-section">
      <button
        id="reset-btn"
        class="btn btn-reset"
        aria-label="Reset all statistics to zero">
        🔄 Reset All Stats
      </button>
    </section>

    <!-- Footer -->
    <footer class="app-footer">
      <p>Stats auto-saved · Refresh-safe ✅</p>
    </footer>

  </main><!-- /.app -->

  <!-- Goal Celebration Overlay -->
  <div id="goal-toast" class="goal-toast" role="alert" aria-live="assertive" aria-atomic="true">
    ⚽ GOAL! 🎉
  </div>

  <script src="script.js"></script>
</body>
</html>
